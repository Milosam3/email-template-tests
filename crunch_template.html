<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template 6 - Product Restock (Mycrunchbox Style)</title>
    <style type="text/css">
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table { border-collapse: collapse; }
        img { max-width: 100%; height: auto; display: block; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        .product-img { padding: 0; }
        .social { text-align: center; padding: 20px 0; }
        .social img { width: 32px; display: inline-block; margin: 0 10px; }
        .footer-text { font-family: Arial, sans-serif; font-size: 12px; color: #727272; text-align: center; padding: 10px 20px; }
        .footer-text a { color: #e48d8d; text-decoration: underline; }
        body { background-color: #f7f7f7; font-family: Arial, sans-serif; }
        @media screen and (max-width: 600px) {
            .container { width: 100% !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 20px; background-color: #f7f7f7;">
    <table class="container" role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #ffffff;">
        <!-- Logo Header -->
        <tr><td class="product-img">
            <a href="#logo"><img src="https://d3k81ch9hvuctc.cloudfront.net/company/YyBmWV/images/f89e39c6-9046-4d5c-a71a-5b32a389c206.png" alt="Your Logo" width="600"></a>
        </td></tr>
        
        <!-- Product Images (Restock Items) -->
        <tr><td class="product-img">
            <a href="#product1"><img src="https://via.placeholder.com/600x400/e8f4f8/333?text=Featured+Item+1+RESTOCKED" alt="Product 1" width="600"></a>
        </td></tr>
        <tr><td class="product-img">
            <a href="#product2"><img src="https://via.placeholder.com/600x400/f0f8ff/333?text=Item+2+Back+in+Stock" alt="Product 2" width="600"></a>
        </td></tr>
        <tr><td class="product-img">
            <a href="#product3"><img src="https://via.placeholder.com/600x400/f5f5f5/333?text=New+Accessory+Drop" alt="Product 3" width="600"></a>
        </td></tr>
        <tr><td class="product-img">
            <a href="#product4"><img src="https://via.placeholder.com/600x400/fff5ee/333?text=Popular+Pick+Restocked" alt="Product 4" width="600"></a>
        </td></tr>
        <tr><td class="product-img">
            <a href="#product5"><img src="https://via.placeholder.com/600x400/e6f3ff/333?text=Bestseller+Refresh" alt="Product 5" width="600"></a>
        </td></tr>
        <tr><td class="product-img">
            <a href="#product6"><img src="https://via.placeholder.com/600x400/f0fff0/333?text=Fan+Favorite+Return" alt="Product 6" width="600"></a>
        </td></tr>

        <!-- Social + Footer -->
        <tr><td class="social">
            <a href="#instagram"><img src="https://d3k81ch9hvuctc.cloudfront.net/assets/email/buttons/subtle/instagram_96.png" alt="Instagram" width="32"></a>
            <a href="#facebook"><img src="https://d3k81ch9hvuctc.cloudfront.net/assets/email/buttons/subtle/facebook_96.png" alt="Facebook" width="32"></a>
        </td></tr>
        <tr><td class="footer-text">
            No longer want to receive these emails? <a href="#unsubscribe">Unsubscribe</a>.<br>Your Company Name, City 12345
        </td></tr>
    </table>
</body>
</html>
