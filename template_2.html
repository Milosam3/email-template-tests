<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Email Template 2 - Flash Sale</title>
    <style type="text/css">
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        body, html { margin: 0; padding: 0; width: 100% !important; }
        table { border-collapse: collapse; }
        img { max-width: 100%; height: auto; display: block; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        .hero { background: linear-gradient(135deg, #ff6b6b, #ff8e8e); color: white; text-align: center; padding: 30px 20px; }
        .zigzag-text { padding: 25px 20px; background: #fff3cd; }
        .zigzag-img { padding: 25px 20px; }
        .cta { background: #ffc107; color: #212529; text-align: center; padding: 25px; }
        .cta a { background: #dc3545; color: white; padding: 20px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; }
        .footer { background: #6c757d; color: white; padding: 20px; text-align: center; font-size: 12px; }
        @media screen and (min-width: 600px) {
            .zigzag-left { float: left; width: 50%; padding-right: 15px; }
            .zigzag-right { float: right; width: 50%; padding-left: 15px; }
        }
    </style>
</head>
<body>
    <table class="container" role="presentation" width="100%" cellpadding="0" cellspacing="0">
        <tr><td class="hero">
            <h1 style="font-family: Arial, sans-serif; margin: 0;">Flash Sale: 50% Off!</h1>
            <p style="margin: 10px 0 0;">Ends in 24 hours</p>
            <img src="https://via.placeholder.com/600x200/ff6b6b/ffffff?text=Flash+Sale+Banner" alt="Sale Banner">
        </td></tr>
        <tr><td>
            <div class="zigzag-img"><img src="https://via.placeholder.com/300x200/fff3cd/333?text=Deal+Image" alt="Deal"></div>
            <div class="zigzag-text">
                <h2 style="font-family: Arial, sans-serif;">Top Deals Inside</h2>
                <p>Edit products and timers.</p>
            </div>
        </td></tr>
        <tr><td>
            <div class="zigzag-text zigzag-left">
                <h2 style="font-family: Arial, sans-serif;">Extra Perk</h2>
                <p>Free shipping added.</p>
            </div>
            <div class="zigzag-img zigzag-right"><img src="https://via.placeholder.com/300x200/ffffff/333?text=Perk" alt="Perk"></div>
        </td></tr>
        <tr><td class="cta">
            <a href="#shop">Claim Your Deal Now</a>
        </tr>
        <tr><td class="footer">
            <p>Company Info | Preferences</p>
        </td></tr>
    </table>
</body>
</html>
